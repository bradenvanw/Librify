<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Manager & Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl m-4 p-6">
        <h1 class="text-2xl font-bold text-center mb-4 text-indigo-600">Library Book Scanner</h1>
        
        <!-- Scanner Container -->
        <div id="reader" class="w-full mb-4"></div>

        <!-- Output Result Display -->
        <div id="result-container" class="mt-4 p-4 bg-gray-50 rounded-lg border border-gray-200 hidden">
            <h2 class="font-semibold text-lg text-gray-700">Scanned ISBN / Code:</h2>
            <p id="scanned-result" class="text-indigo-600 font-mono text-xl mt-1"></p>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // Handle successful scan
            console.log(`Code matched = ${decodedText}`, decodedResult);
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('scanned-result').innerText = decodedText;
            
            // Optional: Pause scanner temporarily or send data to your Google Apps Script backend here
        }

        function onScanFailure(error) {
            // Quietly handle scan failure/no code in frame to avoid console spam
        }

        // Initialize the robust end-to-end scanner UI
        document.addEventListener("DOMContentLoaded", (event) => {
            const scannerConfig = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            };

            const html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                scannerConfig, 
                /* verbose= */ false
            );
            
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        });
    </script>
</body>
</html>
