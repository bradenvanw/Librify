<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Library Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased font-sans pb-12">

    <!-- Simple Mobile Header -->
    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">📚 My Library Scanner</h1>
            <span id="network-dot" class="h-3 w-3 rounded-full bg-green-400 block" title="System Ready"></span>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        <!-- Mock Scanner Input Simulator Box -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <label for="barcode-input" class="block text-sm font-semibold text-gray-600 mb-2">Scan Barcode / Enter ISBN</label>
            <div class="flex gap-2">
                <input type="text" id="barcode-input" placeholder="e.g. 9780141439518" 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-lg">
                <button onclick="handleScanTrigger()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 rounded-xl font-medium shadow-sm transition-colors">Scan</button>
            </div>
            <div id="status-console" class="mt-3 text-xs font-medium hidden rounded-lg p-2.5"></div>
        </section>

        <!-- Dynamic Results Processing Window -->
        <section id="book-result" class="space-y-4"></section>
    </main>

    <script>
        // CONFIGURATION: Connects app to spreadsheet microservice
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNxbhK6GWJyYchRiL0DTtwukG_XJZrjDrtpgO3ukbb7Izw667mk-EzteHoiMSrR5m1ZA/exec";

        // State Machine Tracking Variables
        let currentScannedBook = null;
        let activeCopiesData = [];

        // DOM Pointers
        const barcodeInput = document.getElementById('barcode-input');
        const statusConsole = document.getElementById('status-console');
        const bookResult = document.getElementById('book-result');

        function showStatus(msg, type = 'info') {
            statusConsole.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-blue-50', 'text-blue-700');
            if(type === 'error') statusConsole.classList.add('bg-red-50', 'text-red-700');
            else if(type === 'success') statusConsole.add('bg-green-50', 'text-green-700');
            else statusConsole.classList.add('bg-blue-50', 'text-blue-700');
            statusConsole.textContent = msg;
        }
        function clearStatus() { statusConsole.classList.add('hidden'); }

        function handleScanTrigger() {
            const rawVal = barcodeInput.value;
            if(!rawVal) return showStatus("Please register a valid barcode value first.", "error");
            checkExistingAndFetchMetadata(rawVal);
        }

        // CORE SCAN ENGINE (Direct Browser Lookup reverted back)
        async function checkExistingAndFetchMetadata(isbn) { 
            clearStatus(); 
            bookResult.innerHTML = `<div class="flex items-center justify-center py-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div><span class="ml-3 text-sm text-gray-500">Searching catalog...</span></div>`; 
            const cleanIsbn = isbn.trim().replace(/[-\s]/g, ""); 

            try { 
                // 1. Fetch current catalog copy inventory context directly from Sheet
                const lookupResponse = await fetch(`${GOOGLE_SCRIPT_URL}?isbn=${cleanIsbn}`); 
                if (lookupResponse.ok) {
                    const lookupData = await lookupResponse.json(); 
                    activeCopiesData = lookupData.copies || []; 
                }

                // 2. Query Open Library natively via standard client AJAX
                const url = `https://openlibrary.org/api/books?bibkeys=ISBN:${cleanIsbn}&jscmd=data&format=json`;
                const olResponse = await fetch(url);
                if (!olResponse.ok) throw new Error("Open Library communication crash.");
                
                const olData = await olResponse.json();
                const vol = olData[`ISBN:${cleanIsbn}`]; 

                if (!vol) { 
                    showStatus("No matching data found for this ISBN on Open Library.", "error"); 
                    bookResult.innerHTML = ""; 
                    return; 
                } 

                // Map raw structure data into localized operational schema 
                currentScannedBook = { 
                    isbn: cleanIsbn, 
                    title: vol.title || "Unknown Title", 
                    authors: vol.authors ? vol.authors.map(a => a.name).join(", ") : "Unknown Author", 
                    publisher: vol.publishers ? vol.publishers.map(p => p.name).join(", ") : "N/A", 
                    date: vol.publish_date || "N/A", 
                    thumbnail: vol.cover && vol.cover.large ? vol.cover.large : 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=300', 
                    genre: vol.subjects ? vol.subjects[0].name : "General Reading", 
                    pages: vol.number_of_pages ? `${vol.number_of_pages} pgs` : "N/A" 
                }; 

                showStatus("Book profile matched successfully!", "success"); 
                renderIntegratedLayout(); 
            } catch (err) { 
                showStatus(`System exception occurred: ${err.message}`, "error"); 
                bookResult.innerHTML = ""; 
            } 
        }

        // Renders unified interface showing Metadata + Catalog Inventory state
        function renderIntegratedLayout() {
            if(!currentScannedBook) return;

            let inventoryHtml = `<p class="text-sm text-gray-500 italic">No physical copies registered in this collection yet.</p>`;
            
            if(activeCopiesData.length > 0) {
                inventoryHtml = activeCopiesData.map(copy => `
                    <div class="p-3 bg-gray-50 rounded-xl flex items-center justify-between border border-gray-100">
                        <div>
                            <span class="text-xs font-mono font-bold px-2 py-0.5 rounded bg-gray-200 text-gray-700">${copy.uniqueId}</span>
                            <p class="text-sm font-medium mt-1">Loc: <span class="text-gray-600">${copy.location}</span></p>
                            <p class="text-xs text-gray-500">${copy.status === 'Checked Out' ? `Borrowed by: ${copy.borrower}` : 'Ready on Shelf'}</p>
                        </div>
                        <div>
                            ${copy.status === 'Checked Out' ? 
                              `<span class="text-xs font-semibold text-red-600 bg-red-50 px-2.5 py-1 rounded-full">Out</span>` : 
                              `<button onclick="triggerCheckout('${copy.uniqueId}')" class="text-xs font-semibold bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg transition-colors">Checkout</button>`
                            }
                        </div>
                    </div>
                `).join('');
            }

            bookResult.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-5 flex gap-4">
                        <img src="${currentScannedBook.thumbnail}" class="w-24 h-36 object-cover rounded-lg shadow-sm border bg-gray-100 flex-shrink-0">
                        <div class="space-y-1">
                            <h3 class="font-bold text-lg leading-tight text-gray-900">${currentScannedBook.title}</h3>
                            <p class="text-sm text-gray-600">${currentScannedBook.authors}</p>
                            <div class="pt-2 space-y-0.5 text-xs text-gray-400">
                                <p>ISBN: ${currentScannedBook.isbn}</p>
                                <p>Pub: ${currentScannedBook.publisher} (${currentScannedBook.date})</p>
                                <p>Specs: ${currentScannedBook.pages} | ${currentScannedBook.genre}</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Inventory Management Section -->
                    <div class="border-t border-gray-100 p-5 bg-gray-50/50 space-y-3">
                        <h4 class="text-xs font-bold uppercase tracking-wider text-gray-400">Collection Inventory Status</h4>
                        <div class="space-y-2">${inventoryHtml}</div>
                        <div class="pt-2">
                            <button onclick="triggerAddToInventory()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium shadow-sm transition-colors">
                                + Add Another Copy to System
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Form Submission to execution endpoints
        async function triggerCheckout(id) {
            const borrowerName = prompt("Enter borrower's name:") || "Anonymous";
            showStatus("Processing checkout updates...", "info");

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // standard Apps Script POST compatibility wrapper
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'checkout', uniqueId: id, borrower: borrowerName })
                });
                
                showStatus("Checkout instruction logged! Reloading state...", "success");
                setTimeout(() => checkExistingAndFetchMetadata(currentScannedBook.isbn), 1000);
            } catch(e) {
                showStatus(`Checkout failed: ${e.message}`, "error");
            }
        }

        async function triggerAddToInventory() {
            showStatus("Appending structural copy token...", "info");
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', ...currentScannedBook })
                });
                showStatus("Successfully added! Syncing spreadsheet contents...", "success");
                setTimeout(() => checkExistingAndFetchMetadata(currentScannedBook.isbn), 1000);
            } catch(e) {
                showStatus(`Ingestion failed: ${e.message}`, "error");
            }
        }
    </script>
</body>
</html>
